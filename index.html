<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Cebada</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0e0e0e;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 20px 10px;
}

.logo img {
  height: 80px;
}

/* PRODUCTO */
.product {
  max-width: 500px;
  margin: auto;
}

.img-container {
  border-radius: 20px;
  overflow: hidden;
}

.img-container img {
  width: 100%;
  height: 380px;
  object-fit: cover;
}

/* INFO */
.info {
  padding: 20px;
}

.price {
  font-size: 28px;
  margin: 10px 0;
}

.stock-text {
  margin-top: 10px;
  font-size: 15px;
}

/* BOTONES */
button {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.buy {
  background: white;
  color: black;
}

/* ADMIN OCULTO */
.admin {
  position: fixed;
  bottom: 10px;
  right: 10px;
  display: none;
}
</style>
</head>

<body>

<!-- HEADER (BOTÓN SECRETO) -->
<div class="header">
  <div class="logo" onclick="activarAdmin()">
    <img src="logo.png">
  </div>
</div>

<!-- PRODUCTO -->
<div class="product">

  <div class="img-container">
    <img src="yerba.jpg">
  </div>

  <div class="info">
    <h2>Yerba Baldo 1kg</h2>
    <div class="price">$10.500</div>

    <!-- STOCK -->
    <div id="stockTexto" class="stock-text"></div>

    <button class="buy" onclick="comprar()">Comprar</button>
  </div>

</div>

<!-- PANEL ADMIN -->
<div id="admin" class="admin">
  <button onclick="activarStock()">Stock ON</button>
  <button onclick="desactivarStock()">Stock OFF</button>
</div>

<script>
let stock = localStorage.getItem("stock") === "true";

/* 🔐 SOLO SE ACTIVA AL HACER CLICK */
function activarAdmin() {
  let pass = prompt("Contraseña admin:");

  if (pass === "1234") {
    document.getElementById("admin").style.display = "block";
    alert("Modo admin activado");
  }
}

/* STOCK */
function actualizarStock() {
  const texto = document.getElementById("stockTexto");

  if (stock) {
    texto.innerText = "Stock disponible";
    texto.style.color = "lightgreen";
  } else {
    texto.innerText = "Sin stock";
    texto.style.color = "red";
  }

  localStorage.setItem("stock", stock);
}

function activarStock() {
  stock = true;
  actualizarStock();
}

function desactivarStock() {
  stock = false;
  actualizarStock();
}

/* COMPRA */
function comprar() {
  if (!stock) {
    alert("Sin stock");
    return;
  }

  window.open("https://wa.me/5493364370451?text=Quiero comprar Yerba Baldo 1kg de La Cebada");
}

/* INIT */
actualizarStock();
</script>

</body>
</html>
